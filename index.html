<html lang="ja">

  <title>Couplee | Couples OS</title>

<body>
  <div class="app-bg"><div class="orb one"></div><div class="orb two"></div><div class="orb three"></div></div>
  <div id="app"></div>
  <script>
    const VERSION='5.0.0';
    const STORAGE_KEY='couplee_state_v5_switch_ui';
    const questions=['ふたりで今年中に行きたい場所はどこ？','最近、相手にしてもらって嬉しかったことは？','今週、ふたりの時間を10分増やすなら何をしたい？','相手にもっと伝えたい感謝は？','次のデートで食べたいものは？','言いづらいけれど、本当はお願いしたいことは？','一緒に暮らすなら先に決めておきたいルールは？'];
    const dateIdeas=[['週末カフェ巡り','近場で90分だけ。会話を増やす軽いデート。','☕'],['思い出アルバム整理','写真を3枚選んで、その日の気持ちを残す。','📷'],['夜の散歩','スマホをしまって15分だけ歩く。','🌙'],['サプライズ小物','相手が最近欲しがっていた小物を。','🎁']];
    const defaultState=()=>{const t=new Date();const start=new Date(t);start.setFullYear(t.getFullYear()-2);start.setMonth(t.getMonth()-1);const sk=toKey(start);return{meta:{version:VERSION},profile:{isReady:false,step:1,personA:'ゆうか',personB:'こうた',avatarA:'👩🏻',avatarB:'👨🏻',photoA:'',photoB:'',startDate:sk,anniversaryName:'交際記念日',phase:'遠距離',isLongDistance:true,coupleGoal:'毎日少しだけ会話する',reminderDays:[30,7,1]},points:32540,streak:28,bestStreak:45,companion:{name:'ラビ',emoji:'🐰',exp:68},daily:{date:todayKey(),questionIndex:new Date().getDate()%questions.length,answerA:'',answerB:'',revealed:false,history:[]},moods:{personA:'😊',personB:'😌'},milestones:[{id:cryptoId(),title:'出会った日',date:addDays(sk,-80),emoji:'✨',note:'ここからふたりの物語が始まった。'},{id:cryptoId(),title:'お付き合い開始',date:sk,emoji:'💕',note:'大切な記念日。'},{id:cryptoId(),title:'初めての旅行',date:addDays(sk,150),emoji:'✈️',note:'また行きたい場所。'}],memories:[{id:cryptoId(),title:'沖縄旅行',caption:'きれいな海と美味しいごはん。次は夕日も見に行こう。',place:'沖縄',date:'2024-05-03',emoji:'🌺',image:''},{id:cryptoId(),title:'クリスマスディナー',caption:'予約してくれたお店が本当に素敵だった日。',place:'東京',date:'2023-12-24',emoji:'🎄',image:''},{id:cryptoId(),title:'初めてのキャンプ',caption:'焚き火を見ながら夜遅くまで話した。',place:'山梨',date:'2022-07-16',emoji:'⛺',image:''}],requests:[{id:cryptoId(),title:'デートを計画しよう',detail:'どこか景色のいい場所に行きたい！',from:'personA',status:'pending',reward:60,createdAt:todayKey()},{id:cryptoId(),title:'今夜電話してね',detail:'寝る前に少しだけ声が聞きたいな。',from:'personB',status:'accepted',reward:30,createdAt:todayKey()},{id:cryptoId(),title:'一緒に映画を見る',detail:'週末におすすめ映画を1本見よう。',from:'personA',status:'done',reward:30,createdAt:todayKey()}],events:[{id:cryptoId(),title:'ディナー予約',date:todayKey(),time:'19:00',note:'レストラン・ソラ',type:'date'},{id:cryptoId(),title:'ビデオ通話',date:todayKey(),time:'21:00',note:'おやすみ前の時間',type:'call'}],todos:[{id:cryptoId(),title:'旅行の計画を立てる',owner:'both',done:false},{id:cryptoId(),title:'プレゼントを選ぶ',owner:'personA',done:true},{id:cryptoId(),title:'部屋の掃除',owner:'personB',done:true},{id:cryptoId(),title:'写真の整理',owner:'both',done:false}],privacy:{locationSharing:true,mode:'timed',timedHours:3,consentA:true,consentB:true,shareHistory:[{at:nowIso(),action:'初期設定',detail:'時間限定共有を選択'}]},ui:{view:'home',modal:null,requestFilter:'all',selectedDate:todayKey()}}};
    let state=load(); const app=document.getElementById('app'); render(); setInterval(updateClock,15000);
    function load(){try{const raw=localStorage.getItem(STORAGE_KEY);const base=defaultState();return raw?merge(base,JSON.parse(raw)):base}catch{return defaultState()}}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
    function setState(fn,toast=''){state=typeof fn==='function'?fn(structuredClone(state)):fn;save();render(toast)}
    function merge(b,p){if(!p||typeof p!=='object')return b;const o=Array.isArray(b)?[...b]:{...b};for(const[k,v]of Object.entries(p)){o[k]=v&&typeof v==='object'&&!Array.isArray(v)&&b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])?merge(b[k],v):v}return o}
    function nowIso(){return new Date().toISOString()} function currentTime(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false})} function updateClock(){document.querySelectorAll('.now-time').forEach(el=>el.textContent=currentTime())} function todayKey(){return toKey(new Date())} function toKey(d){const x=new Date(d);const y=x.getFullYear();const m=String(x.getMonth()+1).padStart(2,'0');const day=String(x.getDate()).padStart(2,'0');return `${y}-${m}-${day}`} function cryptoId(){return crypto?.randomUUID?crypto.randomUUID():Date.now()+''+Math.random()} function esc(v=''){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')} function num(v){return Number(v||0).toLocaleString('ja-JP')} function fmt(s,style='short'){if(!s)return'未設定';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('ja-JP',style==='long'?{year:'numeric',month:'long',day:'numeric',weekday:'short'}:{year:'numeric',month:'2-digit',day:'2-digit'})} function days(a,b){return Math.ceil((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)} function addDays(s,d){const x=new Date(s+'T00:00:00');x.setDate(x.getDate()+d);return toKey(x)} function nextAnniv(){const b=new Date(state.profile.startDate+'T00:00:00'),t=new Date(),n=new Date(t.getFullYear(),b.getMonth(),b.getDate()),td=new Date(t.getFullYear(),t.getMonth(),t.getDate());if(n<td)n.setFullYear(t.getFullYear()+1);return toKey(n)} function toAnniv(){return Math.max(0,days(todayKey(),nextAnniv()))} function relDays(){return Math.max(1,days(state.profile.startDate,todayKey()))} function years(){return Math.max(1,new Date(nextAnniv()).getFullYear()-new Date(state.profile.startDate).getFullYear())} function level(){return Math.max(1,Math.floor(state.points/1400))} function q(){return questions[state.daily.questionIndex%questions.length]} function person(k){return k==='personA'?state.profile.personA:k==='personB'?state.profile.personB:'ふたり'} function avatar(k){const p=state.profile; if(k==='personA')return p.photoA?`<img src="${p.photoA}">`:esc(p.avatarA); if(k==='personB')return p.photoB?`<img src="${p.photoB}">`:esc(p.avatarB); return '💞'} function statusLabel(s){return s==='pending'?'未対応':s==='accepted'?'受付中':'完了'}
    function render(toast=''){app.innerHTML=`<main class="shell"><aside class="side"><div class="logo-row"><div class="logo">∞</div><div><h1>Couplee</h1><p>Couples OS v5.1</p></div></div><h2>1画面ずつ切り替える<br>最新UI版</h2><p class="lead">情報量を減らし、ホーム・記念日・アルバム・お願い・カレンダー・プライバシーを下部ナビで切り替えます。初回入力では画像アップロードでアイコンを反映できます。</p><div class="feature-list"><div class="feature"><span>📱</span>1画面集中でわかりやすい</div><div class="feature"><span>🖼️</span>画像アイコンを即反映</div><div class="feature"><span>💌</span>お願い掲示板と予定管理</div><div class="feature"><span>🛡️</span>GPSは同意ベースでON/OFF</div></div><div class="side-preview"><div class="mini-phone"><div class="mini-notch"></div><div class="mini-card"><b>${esc(state.profile.personA)} × ${esc(state.profile.personB)}</b><p style="margin:6px 0 0;color:var(--muted);font-size:12px;font-weight:800">${esc(state.profile.anniversaryName)}まで ${toAnniv()}日</p></div><div class="mini-card">💬 ${esc(q())}</div><div class="mini-card">💗 ${num(state.points)} pt｜Lv.${level()}</div></div></div></aside><div class="phone-wrap"><section class="phone">${state.profile.isReady?phone():onboarding()}${state.ui.modal?modal(state.ui.modal):''}${toast?`<div class="toast">${esc(toast)}</div>`:''}</section></div></main>`;bind();updateClock();if(toast)setTimeout(()=>{if(document.querySelector('.toast'))render()},1700)}

    function home(){return `<div class="hero"><div><div class="count-label">${esc(state.profile.anniversaryName)}まであと</div><div class="count-num">${toAnniv()}<small>日</small></div><span class="pill">🎂 ${fmt(nextAnniv(),'long')}・${years()}年記念</span></div><div class="mascot">${esc(state.companion.emoji)}</div></div><div class="section grid2">${metric('🔥',state.streak+'日','連続記録')}${metric('💗',num(state.points),'ハートポイント')}${metric('🌱','Lv.'+level(),'カップルレベル')}${metric('🐰',state.companion.exp+'%',state.companion.name+'の成長')}</div><div class="section">${daily()}</div><div class="section"><div class="head"><h3>気分チェック</h3><small>今の状態だけ共有</small></div>${mood()}</div><div class="section"><div class="head"><h3>クイック操作</h3><small>必要な機能へ</small></div><div class="quick"><button data-open="memory"><span>📷</span>思い出</button><button data-open="request"><span>💌</span>お願い</button><button data-open="event"><span>🗓️</span>予定</button><button data-view="privacy"><span>🛡️</span>安全</button></div></div><div class="section"><div class="head"><h3>今日の予定</h3><button class="btn" data-open="event">追加</button></div>${eventsHtml(state.events.filter(e=>e.date===todayKey()))}</div>`}

    function mood(){const arr=['😊','😌','🥰','😢','😴','😤'];return `<div class="mood-row">${['personA','personB'].map(k=>`<div class="card mood-card"><header><span>${k==='personA'?esc(state.profile.personA):esc(state.profile.personB)}</span><b>${esc(state.moods[k])}</b></header><div class="moods">${arr.map(m=>`<button data-mood-person="${k}" data-mood="${m}" class="${state.moods[k]===m?'active':''}">${m}</button>`).join('')}</div></div>`).join('')}</div>`}

    function req(r){return `<article class="card request"><div class="request-top"><div><h3>${esc(r.title)}</h3><p>${esc(r.detail)}</p></div><span class="tag ${r.status}">${statusLabel(r.status)}</span></div><div class="btn-row" style="margin-top:10px"><span class="pill">${person(r.from)}から</span><span class="pill">+${r.reward}pt</span></div><div class="btn-row" style="margin-top:10px"><button class="btn" data-req-status="${r.id}:pending">未対応</button><button class="btn" data-req-status="${r.id}:accepted">受付中</button><button class="btn primary" data-req-status="${r.id}:done">完了</button><button class="btn danger" data-delete-request="${r.id}">削除</button></div></article>`}
    function calendar(){const sel=state.ui.selectedDate||todayKey();const ev=state.events.filter(e=>e.date===sel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));const rate=Math.round(state.todos.filter(t=>t.done).length/Math.max(1,state.todos.length)*100);return `<div class="screen-title"><div><h2>共有カレンダー</h2><p>予定とToDoを見やすく管理</p></div><button class="btn primary" data-open="event">予定追加</button></div>${month()}<div class="section"><div class="head"><h3>${fmt(sel)} の予定</h3><button class="btn" data-open="event">追加</button></div>${eventsHtml(ev)}</div><div class="section"><div class="head"><h3>ToDo</h3><button class="btn" data-open="todo">追加</button></div><div class="card"><div class="head"><span class="pill">メンタルロード</span><b>${rate}%</b></div><div class="progress"><span style="width:${rate}%"></span></div></div><div style="display:grid;gap:8px;margin-top:10px">${state.todos.map(t=>`<label class="todo ${t.done?'done':''}"><input type="checkbox" data-todo="${t.id}" ${t.done?'checked':''}><span>${esc(t.title)}｜${esc(person(t.owner))}</span><button class="btn danger" type="button" data-delete-todo="${t.id}">削除</button></label>`).join('')}</div></div>`}
    function month(){const sel=new Date((state.ui.selectedDate||todayKey())+'T00:00:00'),y=sel.getFullYear(),m=sel.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),cells=[];for(let i=0;i<first.getDay();i++)cells.push(null);for(let d=1;d<=last.getDate();d++)cells.push(new Date(y,m,d));return `<div class="card calendar-card"><div class="month-head"><button class="btn" data-month="-1">‹</button><b>${y}年${m+1}月</b><button class="btn" data-month="1">›</button></div><div class="month-grid">${['日','月','火','水','木','金','土'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells.map(d=>d?`<button class="day ${toKey(d)===todayKey()?'today':''} ${state.events.some(e=>e.date===toKey(d))?'has':''}" data-date="${toKey(d)}">${d.getDate()}</button>`:'<div></div>').join('')}</div></div>`}
    function eventsHtml(arr){return arr.length?`<div class="event-list">${arr.map(e=>`<div class="event"><time>${esc(e.time||'--:--')}</time><div><h4>${esc(e.title)}</h4><p>${esc(e.note||'')}｜${esc(e.type||'予定')}</p></div><button class="btn danger" data-delete-event="${e.id}">削除</button></div>`).join('')}</div>`:'<div class="card empty">予定はまだありません</div>'}
    function privacy(){return `<div class="screen-title"><div><h2>プライバシー</h2><p>GPSは同意ベースで安全に</p></div></div><div class="card hero"><div class="head"><div><h3>位置情報の共有</h3><small>${state.privacy.locationSharing?'ON':'OFF'}｜${modeLabel()}</small></div><button class="switch ${state.privacy.locationSharing?'on':''}" data-action="toggleLocation"></button></div><div class="mini-map"><div class="pin"><span>💞</span></div></div></div><div class="section" style="display:grid;gap:9px">${popt('always','📍','常に共有','双方同意した場合のみ共有')}${popt('timed','⏱️','時間限定共有',state.privacy.timedHours+'時間だけ共有')}${popt('emergency','🆘','緊急時のみ','普段はOFF、緊急時のみ')}</div><div class="section card"><div class="head"><h3>同意ステータス</h3><small>双方ONで有効</small></div><label class="todo"><input type="checkbox" data-consent="consentA" ${state.privacy.consentA?'checked':''}><span>${esc(state.profile.personA)} が同意</span></label><label class="todo"><input type="checkbox" data-consent="consentB" ${state.privacy.consentB?'checked':''}><span>${esc(state.profile.personB)} が同意</span></label></div><div class="section"><div class="head"><h3>安全操作</h3><small>いつでも解除可能</small></div><div class="grid2"><button class="btn" data-action="exportData">データ書き出し</button><button class="btn" data-action="copyInvite">招待リンク</button><button class="btn danger" data-action="unlinkPartner">連携解除</button><button class="btn danger" data-action="wipeData">全データ削除</button></div></div>`}
    function popt(m,i,t,d){return `<button class="privacy-option ${state.privacy.mode===m?'active':''}" data-privacy-mode="${m}"><span>${i}</span><div><strong>${t}</strong><small>${d}</small></div><span>${state.privacy.mode===m?'✓':''}</span></button>`} function modeLabel(){return state.privacy.mode==='always'?'常に共有':state.privacy.mode==='emergency'?'緊急時のみ':'時間限定'}
    function modal(type){const title={memory:'思い出を追加',request:'お願いを追加',event:'予定を追加',todo:'ToDoを追加',milestone:'軌跡を追加'}[type]||'追加';return `<div class="modal-backdrop"><div class="modal"><div class="modal-head"><h3>${title}</h3><button class="x" data-close>×</button></div>${modalBody(type)}</div></div>`}
    function modalBody(type){if(type==='memory')return `<form data-form="memory"><div class="field"><label>タイトル</label><input name="title" required></div><div class="form-grid"><div class="field"><label>日付</label><input name="date" type="date" value="${todayKey()}"></div><div class="field"><label>場所</label><input name="place"></div></div><div class="field"><label>写真</label><input name="image" type="file" accept="image/*"></div><div class="field"><label>キャプション</label><textarea name="caption"></textarea></div><button class="btn primary full">保存</button></form>`;if(type==='request')return `<form data-form="request"><div class="field"><label>お願いタイトル</label><input name="title" required></div><div class="field"><label>内容</label><textarea name="detail"></textarea></div><div class="form-grid"><div class="field"><label>投稿者</label><select name="from"><option value="personA">${esc(state.profile.personA)}</option><option value="personB">${esc(state.profile.personB)}</option></select></div><div class="field"><label>報酬pt</label><input name="reward" type="number" value="30"></div></div><button class="btn primary full">追加</button></form>`;if(type==='event')return `<form data-form="event"><div class="field"><label>予定名</label><input name="title" required></div><div class="form-grid"><div class="field"><label>日付</label><input name="date" type="date" value="${state.ui.selectedDate||todayKey()}"></div><div class="field"><label>時間</label><input name="time" type="time" value="19:00"></div></div><div class="field"><label>メモ</label><input name="note"></div><button class="btn primary full">追加</button></form>`;if(type==='todo')return `<form data-form="todo"><div class="field"><label>ToDo</label><input name="title" required></div><div class="field"><label>担当</label><select name="owner"><option value="both">ふたり</option><option value="personA">${esc(state.profile.personA)}</option><option value="personB">${esc(state.profile.personB)}</option></select></div><button class="btn primary full">追加</button></form>`;if(type==='milestone')return `<form data-form="milestone"><div class="field"><label>タイトル</label><input name="title" required></div><div class="form-grid"><div class="field"><label>日付</label><input name="date" type="date" value="${todayKey()}"></div><div class="field"><label>絵文字</label><input name="emoji" value="✨"></div></div><div class="field"><label>メモ</label><input name="note"></div><button class="btn primary full">追加</button></form>`;return ''}
    function bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>setState(s=>{s.ui.view=b.dataset.view;return s}));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>setState(s=>{s.ui.modal=b.dataset.open;return s}));document.querySelectorAll('[data-close],.modal-backdrop').forEach(el=>el.onclick=e=>{if(e.target===el||el.dataset.close!==undefined)setState(s=>{s.ui.modal=null;return s})});const of=document.getElementById('onboardingForm');if(of){of.onsubmit=submitOnboard;of.querySelectorAll('input:not([type=file]),select,textarea').forEach(el=>{const ev=el.tagName==='SELECT'||el.type==='checkbox'||el.type==='date'?'change':'input';el.addEventListener(ev,()=>{syncOnboardField(el);save()})})}document.querySelectorAll('[data-on-prev]').forEach(b=>b.onclick=()=>setState(s=>{s.profile.step=Math.max(1,(s.profile.step||1)-1);return s}));document.querySelectorAll('input[type=file]').forEach(i=>i.onchange=async()=>{syncOnboardForm();if(i.files&&i.files[0]){const data=await readFile(i.files[0]); if(i.name==='photoA')state.profile.photoA=data; if(i.name==='photoB')state.profile.photoB=data; save(); render('画像を反映しました')}});document.querySelectorAll('[data-daily]').forEach(t=>t.oninput=()=>{state.daily[t.dataset.daily]=t.value;save()});document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action));document.querySelectorAll('[data-mood-person]').forEach(b=>b.onclick=()=>setState(s=>{s.moods[b.dataset.moodPerson]=b.dataset.mood;s.points+=5;s.companion.exp=Math.min(100,s.companion.exp+2);return s},'気分を共有しました'));document.querySelectorAll('[data-reminder]').forEach(b=>b.onclick=()=>setState(s=>{const d=Number(b.dataset.reminder),set=new Set(s.profile.reminderDays);set.has(d)?set.delete(d):set.add(d);s.profile.reminderDays=[...set].sort((a,b)=>b-a);return s},'通知設定を更新しました'));document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>setState(s=>{s.ui.requestFilter=b.dataset.filter;return s}));document.querySelectorAll('[data-req-status]').forEach(b=>b.onclick=()=>{const[id,status]=b.dataset.reqStatus.split(':');setState(s=>{const r=s.requests.find(x=>x.id===id);if(r){const was=r.status;r.status=status;if(status==='done'&&was!=='done')s.points+=Number(r.reward||0)}return s},status==='done'?'お願いを完了しました':'更新しました')});document.querySelectorAll('[data-delete-request]').forEach(b=>b.onclick=()=>confirm('削除しますか？')&&setState(s=>{s.requests=s.requests.filter(r=>r.id!==b.dataset.deleteRequest);return s},'削除しました'));document.querySelectorAll('[data-delete-memory]').forEach(b=>b.onclick=()=>confirm('削除しますか？')&&setState(s=>{s.memories=s.memories.filter(r=>r.id!==b.dataset.deleteMemory);return s},'削除しました'));document.querySelectorAll('[data-delete-event]').forEach(b=>b.onclick=()=>confirm('削除しますか？')&&setState(s=>{s.events=s.events.filter(r=>r.id!==b.dataset.deleteEvent);return s},'削除しました'));document.querySelectorAll('[data-delete-todo]').forEach(b=>b.onclick=e=>{e.preventDefault();confirm('削除しますか？')&&setState(s=>{s.todos=s.todos.filter(r=>r.id!==b.dataset.deleteTodo);return s},'削除しました')});document.querySelectorAll('[data-todo]').forEach(c=>c.onchange=()=>setState(s=>{const t=s.todos.find(x=>x.id===c.dataset.todo);if(t){t.done=c.checked;if(c.checked)s.points+=10}return s},'ToDoを更新しました'));document.querySelectorAll('[data-date]').forEach(b=>b.onclick=()=>setState(s=>{s.ui.selectedDate=b.dataset.date;return s}));document.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>setState(s=>{const d=new Date((s.ui.selectedDate||todayKey())+'T00:00:00');d.setMonth(d.getMonth()+Number(b.dataset.month));s.ui.selectedDate=toKey(d);return s}));document.querySelectorAll('[data-privacy-mode]').forEach(b=>b.onclick=()=>setState(s=>{s.privacy.mode=b.dataset.privacyMode;s.privacy.shareHistory.push({at:nowIso(),action:'共有モード変更',detail:modeLabel()});return s},'共有モードを更新しました'));document.querySelectorAll('[data-consent]').forEach(c=>c.onchange=()=>setState(s=>{s.privacy[c.dataset.consent]=c.checked;return s},'同意設定を更新しました'));document.querySelectorAll('[data-form]').forEach(f=>f.onsubmit=handleForm)}
    function syncOnboardField(el){if(!el||!el.name)return;if(el.name==='isLongDistance')state.profile.isLongDistance=!!el.checked;else state.profile[el.name]=el.value}function syncOnboardForm(){const f=document.getElementById('onboardingForm');if(!f)return;f.querySelectorAll('input:not([type=file]),select,textarea').forEach(syncOnboardField)}async function submitOnboard(e){e.preventDefault();syncOnboardForm();const step=state.profile.step||1;if(step<3){state.profile.step=step+1;save();render();return}state.profile.isReady=true;state.profile.step=3;const exists=state.milestones.some(m=>m.title===state.profile.anniversaryName&&m.date===state.profile.startDate);if(!exists)state.milestones=[{id:cryptoId(),title:state.profile.anniversaryName,date:state.profile.startDate,emoji:'💕',note:'ふたりの大切な日'},...state.milestones];save();render('専用アプリを作成しました')}
    async function handleForm(e){e.preventDefault();const f=e.currentTarget,fd=new FormData(f),type=f.dataset.form;if(type==='memory'){let image='';const file=fd.get('image');if(file&&file.size)image=await readFile(file);setState(s=>{s.memories.unshift({id:cryptoId(),title:fd.get('title')||'新しい思い出',caption:fd.get('caption')||'',place:fd.get('place')||'',date:fd.get('date')||todayKey(),emoji:'📷',image});s.points+=20;s.ui.modal=null;return s},'思い出を追加しました')}if(type==='request')setState(s=>{s.requests.unshift({id:cryptoId(),title:fd.get('title')||'お願い',detail:fd.get('detail')||'',from:fd.get('from')||'personA',status:'pending',reward:Number(fd.get('reward')||30),createdAt:todayKey()});s.ui.modal=null;return s},'お願いを追加しました');if(type==='event')setState(s=>{s.events.push({id:cryptoId(),title:fd.get('title')||'予定',date:fd.get('date')||todayKey(),time:fd.get('time')||'',note:fd.get('note')||'',type:'date'});s.ui.selectedDate=fd.get('date')||todayKey();s.ui.modal=null;return s},'予定を追加しました');if(type==='todo')setState(s=>{s.todos.push({id:cryptoId(),title:fd.get('title')||'ToDo',owner:fd.get('owner')||'both',done:false});s.ui.modal=null;return s},'ToDoを追加しました');if(type==='milestone')setState(s=>{s.milestones.push({id:cryptoId(),title:fd.get('title')||'軌跡',date:fd.get('date')||todayKey(),emoji:fd.get('emoji')||'✨',note:fd.get('note')||''});s.ui.modal=null;return s},'軌跡を追加しました')}
    function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
    function action(a){if(a==='revealDaily')return setState(s=>{s.daily.revealed=true;s.points+=40;s.companion.exp=Math.min(100,s.companion.exp+10);return s},'回答を開きました');if(a==='nextQuestion')return setState(s=>{s.daily.questionIndex=(s.daily.questionIndex+1)%questions.length;s.daily.answerA='';s.daily.answerB='';s.daily.revealed=false;return s},'質問を変更しました');if(a==='toggleLocation')return setState(s=>{s.privacy.locationSharing=!s.privacy.locationSharing;s.privacy.shareHistory.push({at:nowIso(),action:'位置情報共有',detail:s.privacy.locationSharing?'ON':'OFF'});return s},'位置情報設定を更新しました');if(a==='testReminder')return testNotification();if(a==='exportData')return exportData();if(a==='copyInvite')return copyInvite();if(a==='unlinkPartner')return confirm('パートナー連携を解除しますか？')&&setState(s=>{s.profile.personB='未連携';s.privacy.locationSharing=false;return s},'連携を解除しました');if(a==='wipeData')return confirm('全データを削除しますか？')&&(localStorage.removeItem(STORAGE_KEY),state=defaultState(),render('全データを削除しました'))}
    async function testNotification(){if(!('Notification'in window))return render('通知非対応です');let p=Notification.permission;if(p==='default')p=await Notification.requestPermission();if(p==='granted'){new Notification('Couplee 記念日リマインダー',{body:`${state.profile.anniversaryName}まであと${toAnniv()}日です。`});render('通知テストを送信しました')}else render('通知が許可されていません')}
    function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='couplee-data-'+todayKey()+'.json';a.click();URL.revokeObjectURL(url);render('データを書き出しました')}
    async function copyInvite(){const url=location.origin+'?invite=Couplee';try{await navigator.clipboard.writeText(url);render('招待リンクをコピーしました')}catch{prompt('招待リンク',url)}}
  </script>
</body>
</html>
