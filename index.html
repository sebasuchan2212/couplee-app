    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:radial-gradient(circle at top left,#fff 0,#fff8fa 35%,#fff1f5 100%);color:var(--ink);min-height:100vh;overflow-x:hidden} button,input,textarea,select{font:inherit} button{cursor:pointer;border:0;background:none;color:inherit} .app{min-height:100vh;padding:22px clamp(14px,2vw,32px) 26px}.brandbar{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1780px;margin:0 auto 16px}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--pink),#ff4d7d);display:grid;place-items:center;color:white;font-weight:900;font-size:28px;box-shadow:var(--soft)}.brand h1{font-size:28px;margin:0;color:#ff638a;letter-spacing:-.02em}.brand p{margin:2px 0 0;color:var(--muted);font-weight:700}.top-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border-radius:999px;padding:11px 16px;background:rgba(255,255,255,.88);border:1px solid var(--line);font-weight:900;box-shadow:var(--soft);font-size:13px}.btn.primary{background:linear-gradient(135deg,var(--pink),#ff4e80);color:white;border:0}.btn.danger{color:#ff4e6d;border-color:#ffd2dc;background:#fff5f7}.showcase{max-width:1780px;margin:0 auto;display:grid;grid-template-columns:repeat(3,minmax(300px,1fr));gap:18px;align-items:start}.panel-title{display:flex;align-items:center;gap:10px;margin:0 0 8px 18px}.num{width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,var(--pink),#ff8aa8);display:grid;place-items:center;color:white;font-weight:950;font-size:18px}.panel-title h2{font-size:20px;margin:0;font-weight:950}.panel-title p{margin:2px 0 0;color:var(--muted);font-size:12px;font-weight:800}.phone{height:536px;background:linear-gradient(180deg,#fff,#fff8fa 55%,#fff2f5);border:8px solid #171417;border-radius:42px;box-shadow:0 30px 70px rgba(30,20,30,.19);position:relative;overflow:hidden}.phone:before{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);width:125px;height:25px;background:#171417;border-radius:0 0 18px 18px;z-index:5}.status{height:38px;padding:8px 24px 0;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:900}.status .icons{font-size:11px}.screen-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px}.screen-head h3{margin:0;font-size:16px;font-weight:950}.screen-head small{display:block;color:var(--muted);font-weight:800;font-size:11px;margin-top:2px}.avatars{display:flex;align-items:center}.avatar{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid #fff;box-shadow:var(--soft);display:grid;place-items:center;margin-left:-6px}.scroll{height:calc(100% - 88px);overflow:auto;padding:0 18px 90px;scrollbar-width:none}.scroll::-webkit-scrollbar{display:none}.card{background:rgba(255,255,255,.86);border:1px solid rgba(255,215,225,.9);border-radius:22px;box-shadow:0 10px 28px rgba(255,111,145,.10);backdrop-filter:blur(10px)}.hero{padding:18px;background:linear-gradient(135deg,#fff,#ffe9ef);display:flex;justify-content:space-between;gap:12px;min-height:142px;position:relative;overflow:hidden}.hero:after{content:"💕 ✨ 💕";position:absolute;right:16px;top:14px;opacity:.32}.label{font-size:11px;color:#d36684;font-weight:900}.big{font-size:44px;line-height:.95;margin:5px 0;font-weight:950;color:#df4c68;letter-spacing:-.05em}.big small{font-size:17px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#fff4f7;border:1px solid #ffd9e3;color:#b94d69;padding:6px 10px;font-size:11px;font-weight:900}.mascot{width:86px;height:86px;border-radius:30px;background:linear-gradient(135deg,#fff,#ffe1ea);display:grid;place-items:center;font-size:48px;align-self:center;box-shadow:inset 0 -8px 18px rgba(255,111,145,.12)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display: dow:0 0 0 4px #ffe1e9}.time-item h4{margin:0 0 4px;font-size:13px}.time-item p{margin:0;color:var(--muted);font-weight:800;font-size:10px}.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.badge{padding:11px;border-radius:18px;background:#fff;border:1px solid #f1d4dd;text-align:center}.badge i{display:block;font-style:normal;font-size:24px}.badge b{font-size:9px}.plan{height:86px;padding:12px;border-radius:18px;color:#fff;background:linear-gradient(135deg,#7451d8,#ff87a5);display:flex;align-items:end;font-weight:950;box-shadow:var(--soft)}.tabs{display:flex;gap:8px;margin:0 0 12px;position:sticky;top:0;background:linear-gradient(180deg,#fff8fa,#fff8fa00);padding-bottom:8px;z-index:2}.tabs button{border-radius:999px;background:#fff;border:1px solid #f0d4dd;padding:8px 13px;color:#9b838d;font-size:11px;font-weight:900}.tabs button.active{background:#ffe4ec;color:#e85579}.memory{display:grid;grid-template-columns:116px 1fr;gap:10px;padding:10px;margin-bottom:10px}.photo{height:84px;border-radius:16px;background:linear-gradient(135deg,#48336e,#ffb3c6);display:grid;place-items:center;color:#fff;font-size:34px;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover}.memory h4{margin:0 0 5px;font-size:13px}.memory p{margin:0;color:var(--muted);font-size:10px;font-weight:800;line-height:1.5}.heart{color:#ef5a7f;font-weight:950;font-size:11px}.float{position:absolute;right:20px;bottom:82px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#ff4f80);color:white;font-size:26px;box-shadow:0 12px 24px rgba(255,86,125,.35);z-index:6}.request{padding:12px;margin-bottom:9px}.request-top{display:flex;justify-content:space-between;gap:8px}.request h4{margin:0 0 5px;font-size:13px}.request p{margin:0;color:var(--muted);font-size:10px;font-weight:800;line-height:1.5}.tag{border-radius:999px;padding:5px 9px;font-size:10px;font-weight:950;white-space:nowrap}.pending{background:#fff1d9;color:#c58112}.accepted{background:#e7f0ff;color:#5573c8}.done{background:#dff9ec;color:#278b5e}.req-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.req-actions button{font-size:10px;padding:6px 9px;border-radius:999px;background:#fff4f7;border:1px solid #f1d3dc;font-weight:900}.score{padding:14px;text-align:center}.score .circle{width:82px;height:82px;border-radius:50%;margin:8px auto;background:conic-gradient(var(--pink) calc(var(--rate)*1%),#ffe5ec 0);display:grid;place-items:center;font-weight:950}.month{padding:14px}.month-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:950}.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.day,.dow{height:28px;border-radius:9px;display:grid;place-items:center;font-size:10px;font-weight:900}.dow{color:#a08a93}.day{background:#fff;border:1px solid #f0d5de}.day.today{background:#ff6f91;color:#fff}.day.selected{box-shadow:0 0 0 2px #ff6f91 inset}.day.has:after{content:"";width:4px;height:4px;border-radius:50%;background:#ff6f91;display:block;margin-top:-5px}.event{display:grid;grid-template-columns:48px 1fr auto;gap:9px;align-items:center;padding:11px;margin-bottom:8px}.event time{font-size:11px;font-weight:950;color:#d65d7c}.event h4{margin:0;font-size:12px}.event p{margin:2px 0 0;color:var(--muted);font-size:10px;font-weight:800}.todo{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #f0d5de;border-radius:15px;padding:9px;margin-bottom:7px;font-size:11px;font-weight:850}.todo input{accent-color:var(--pink)}.todo.done span{text-decoration:line-through;color:#aaa}.privacy-option{width:100%;display:grid;grid-template-columns:38px 1fr 24px;gap:10px;align-items:center;text-align:left;padding:13px;border-radius:18px;background:#fff;border:1px solid #f0d5de;margin-bottom:9px}.privacy-option.active{background:#fff0f5;border-color:#ff9fba}.privacy-option strong{font-size:12px}.privacy-option small{display:block;color:var(--muted);font-size:9px;font-weight:800;margin-top:2px}.switch{width:54px;height:30px;border-radius:999px;background:#ddd;position:relative}.switch:after{content:"";position:absolute;top:4px;left:4px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}.switch.on{background:linear-gradient(135deg,var(--pink),#ff4f80)}.switch.on:after{left:28px}.map{height:115px;border-radius:20px;background:linear-gradient(135deg,#eef7ff,#ffe3ec);position:relative;overflow:hidden}.map:before,.map:after{content:"";position:absolute;border:2px solid rgba(255,111,145,.25);border-radius:50%;inset:18px}.map:after{inset:36px}.pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:var(--soft)}.footer{max-width:1780px;margin:18px auto 0;display:grid;grid-template-columns:1.2fr repeat(4,1fr);gap:12px;align-items:center;background:rgba(255,255,255,.72);border:1px solid #f5dfe6;border-radius:28px;padding:15px 18px;box-shadow:var(--soft)}.foot-item{display:flex;align-items:center;gap:10px}.foot-icon{width:42px;height:42px;border-radius:15px;background:#fff0f5;display:grid;place-items:center;font-size:22px}.foot-item b{display:block;font-size:13px}.foot-item small{color:var(--muted);font-weight:800}.modal-back{position:fixed;inset:0;background:rgba(60,30,45,.28);backdrop-filter:blur(6px);z-index:30;display:grid;place-items:center;padding:18px}.modal{width:min(440px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 35px 90px rgba(70,20,40,.25);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.modal h3{margin:0;font-size:18px}.x{font-size:28px;color:#c56b84}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:950;color:#7a636e;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid #efd5de;background:#fff9fb;border-radius:15px;padding:12px;outline:none}.field textarea{min-height:88px;resize:vertical}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{width:100%;justify-content:center}.hidden{display:none!important}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#241b22;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;z-index:60;box-shadow:0 15px 40px rgba(0,0,0,.25)}

    @media(max-width:720px){.app{padding:12px}.showcase{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:12px}.panel{min-width:92vw;scroll-snap-align:start}.phone{height:640px;border-width:6px}.footer{grid-template-columns:1fr}.top-actions{width:100%}.btn{font-size:12px}.brand h1{font-size:23px}.grid3{grid-template-columns:1fr}.memory{grid-template-columns:94px 1fr}.footer{display:none}}

<body>
<div id="app"></div>
<script>
const KEY='couplee_exact_v4';
const $=s=>document.querySelector(s); const today=()=>new Date().toISOString().slice(0,10); const id=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random()+'';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const fmt=s=>new Date((s||today())+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
const days=(a,b)=>Math.ceil((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
function nextAnniv(start){const b=new Date(start+'T00:00:00'),t=new Date(),n=new Date(t.getFullYear(),b.getMonth(),b.getDate()),td=new Date(t.getFullYear(),t.getMonth(),t.getDate());if(n<td)n.setFullYear(t.getFullYear()+1);return n.toISOString().slice(0,10)}
function initial(){const d=new Date();d.setFullYear(d.getFullYear()-2);d.setMonth(d.getMonth()-1);const sd=d.toISOString().slice(0,10);return{ready:false,a:'ゆうか',b:'こうた',aa:'👩🏻',bb:'👨🏻',start:sd,anniv:'3年記念日',phase:'遠距離',goal:'毎日少しだけ会話する',points:32540,streak:28,best:45,level:23,moodA:'😊',moodB:'😌',q:'ふたりで行きたい場所はどこ？',ansA:'',ansB:'',revealed:false,album:[{id:id(),t:'沖縄旅行 🌺',d:'2024-05-03',p:'沖縄',c:'きれいな海と美味しいごはん！',img:''},{id:id(),t:'クリスマスディナー 🎄',d:'2023-12-24',p:'東京',c:'最高の夜だったね',img:''},{id:id(),t:'初めてのキャンプ ⛺',d:'2022-07-16',p:'山梨',c:'星がきれいだった！',img:''}],wishes:[{id:id(),t:'デートを計画しよう',c:'どこか景色のいい場所に行きたい！',s:'pending',from:'a',pt:60},{id:id(),t:'今夜電話してね',c:'寝る前に声が聞きたいな',s:'accepted',from:'b',pt:30},{id:id(),t:'お花を買う',c:'記念日にお花がほしいな',s:'done',from:'a',pt:30},{id:id(),t:'一緒に映画を見る',c:'おすすめの映画を見よう！',s:'pending',from:'b',pt:30}],events:[{id:id(),t:'ディナー予約',d:today(),time:'19:00',memo:'レストラン・ソラ',type:'デート'},{id:id(),t:'ビデオ通話',d:today(),time:'21:00',memo:'おやすみ前の時間',type:'通話'}],todos:[{id:id(),t:'旅行の計画を立てる',who:'ふたり',done:false},{id:id(),t:'プレゼントを選ぶ',who:'ゆうか',done:true},{id:id(),t:'部屋の掃除',who:'こうた',done:true},{id:id(),t:'写真の整理',who:'ふたり',done:false}],privacy:{on:true,mode:'timed',a:true,b:true,hours:3,logs:[{at:new Date().toLocaleString('ja-JP'),m:'時間限定共有を選択'}]},selected:today(),filter:'all',modal:null}}
let S=JSON.parse(localStorage.getItem(KEY)||'null')||initial(); const save=()=>localStorage.setItem(KEY,JSON.stringify(S)); const toast=m=>{let d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),1800)};
function render(){const app=$('#app'); if(!S.ready){app.innerHTML=onboard(); bind(); return} app.innerHTML=`<main class="app"><div class="brandbar"><div class="brand"><div class="logo">∞</div><div><h1>Couplee</h1><p>ふたりの毎日を、もっと愛おしく。</p></div></div><div class="top-actions"><button class="btn" data-modal="profile">名前・記念日を編集</button><button class="btn primary" data-reset>初期化</button></div></div><div class="showcase">${panel(1,'ホーム','ふたりの毎日をまとめてチェック',home())}${panel(2,'記念日','大切な日を一緒にお祝いしよう',anniversary())}${panel(3,'アルバム','思い出を残して、未来に振り返ろう',album())}${panel(4,'お願い掲示板','お願いごとややりたいことを共有しよう',board())}${panel(5,'共有カレンダー','予定を共有して、もっとスムーズに',calendar())}${panel(6,'プライバシー','安心・安全に使うための設定を大切に',privacy())}</div><div class="footer"><div class="foot-item"><div class="logo">∞</div><div><b style="color:#ff638a;font-size:22px">Couplee</b><small>ふたりの毎日を、もっと愛おしく。</small></div></div>${[['💞','つながりを深める','毎日のコミュニケーションをサポート'],['🖼️','思い出をカタチに','大切な瞬間を残して振り返る'],['🎮','一緒に成長する','ゲーム感覚で楽しく続けられる'],['🛡️','安心・安全設計','プライバシーを最優先に設計']].map(x=>`<div class="foot-item"><div class="foot-icon">${x[0]}</div><div><b>${x[1]}</b><small>${x[2]}</small></div></div>`).join('')}</div>${S.modal?modal(S.modal):''}</main>`;bind()}
function panel(n,t,sub,body){return`<section class="panel"><div class="panel-title"><span class="num">${n}</span><div><h2>${t}</h2><p>${sub}</p></div></div><div class="phone"><div class="status"><span>9:41</span><span class="icons">▮▮▮ 5G 🔋</span></div>${body}</div></section>`}
function head(t,sub,active){return`<div class="screen-head"><div><h3>${t}</h3><small>${sub}</small></div><div class="avatars"><div class="avatar">${esc(S.aa)}</div><div class="avatar">${esc(S.bb)}</div></div></div>`}
function nav(active){return`<nav class="nav">${[['home','🏠','ホーム'],['anniversary','💗','記念日'],['album','🖼️','アルバム'],['board','💌','お願い'],['calendar','🗓️','カレンダー'],['privacy','☰','メニュー']].map(x=>`<button class="${x[0]==active?'active':''}"><span>${x[1]}</span>${x[2]}</button>`).join('')}</nav>`}
function home(){const na=nextAnniv(S.start),dt=Math.max(0,days(today(),na));return`${head('おはよう、'+esc(S.a)+'さん ☀️','素敵な1日をふたりでつくろうね','home')}<div class="scroll"><div class="hero card"><div><div class="label">記念日まであと</div><div class="big">${dt}<small>日</small></div><span class="pill">${fmt(na)} ${esc(S.anniv)} 💕</span></div><div class="mascot">🐰</div></div><div class="section grid2"><div class="metric card"><span>カップルレベル</span><b>Lv. ${S.level}</b></div><div class="metric card"><span>ハートポイント</span><b>${S.points.toLocaleString()}</b></div></div><div class="section daily card"><h4>今日の質問</h4><p style="font-weight:900;margin:0 0 8px">${esc(S.q)}</p><textarea data-ans="ansA" placeholder="${esc(S.a)}の回答">${esc(S.ansA)}</textarea><textarea data-ans="ansB" placeholder="${esc(S.b)}の回答" style="margin-top:7px">${esc(S.ansB)}</textarea><div class="daily-actions"><button class="mini-btn primary" data-reveal>答える</button><button class="mini-btn" data-nextq>質問変更</button></div>${S.revealed?`<div class="pill" style="margin-top:8px">${esc(S.a)}: ${esc(S.ansA)} / ${esc(S.b)}: ${esc(S.ansB)}</div>`:''}</div><div class="section"><div class="section-title"><h4>気分チェック</h4><small>お互いの気分をシェア</small></div><div class="moods">${mood('A')}${mood('B')}</div></div><div class="section"><div class="section-title"><h4>予定</h4><button class="mini-btn" data-modal="event">追加</button></div>${events(today())}</div></div><button class="float" data-modal="wish">+</button>${nav('home')}`}
function mood(k){const key=k==='A'?'moodA':'moodB',name=k==='A'?S.a:S.b;return`<div class="mood-card card"><div><b>${esc(name)}</b><div class="mood-pick">${['😊','😌','🥰','😢','😴'].map(m=>`<button data-mood="${key}:${m}" class="${S[key]===m?'active':''}">${m}</button>`).join('')}</div></div><b style="font-size:28px">${S[key]}</b></div>`}
function anniversary(){const na=nextAnniv(S.start),dt=Math.max(0,days(today(),na));return`${head('記念日','大切な日を一緒にお祝いしよう','anniversary')}<div class="scroll"><div class="hero card"><div><div class="label">次の記念日まで</div><div class="big">${dt}<small>日</small></div><span class="pill">${fmt(na)} ${esc(S.anniv)}</span></div><div class="mascot">💑</div></div><div class="section grid2"><div><div class="section-title"><h4>ふたりの軌跡</h4><button class="mini-btn" data-modal="milestone">追加</button></div><div class="timeline">${[{t:'出会った日',d:S.start,e:'✨',n:'ここから始まった'},{t:'100日記念日',d:S.start,e:'💯',n:'最初の節目'},{t:S.anniv,d:na,e:'💕',n:'次の大切な日'}].map(x=>`<div class="time-item card"><h4>${x.e} ${esc(x.t)}</h4><p>${fmt(x.d)}｜${esc(x.n)}</p></div>`).join('')}</div></div><div><div class="section-title"><h4>マイルストーンバッジ</h4><small>獲得中</small></div><div class="badge-grid">${['💯 100日','🎁 1年記念','🏆 継続','🌟 写真','💌 お願い','💎 特別'].map(b=>`<div class="badge"><i>${b.split(' ')[0]}</i><b>${b.split(' ')[1]}</b></div>`).join('')}</div></div></div><div class="section"><div class="section-title"><h4>おすすめプラン</h4><button class="mini-btn" data-notify>通知テスト</button></div><div class="grid2"><div class="plan">週末旅行<br><small>自然の中でリラックス</small></div><div class="plan">サプライズディナー<br><small>特別な夜にしよう</small></div></div></div></div>${nav('anniversary')}`}
function album(){const items=[...S.album].sort((a,b)=>b.d.localeCompare(a.d));return`${head('アルバム','思い出を残して、未来に振り返ろう','album')}<div class="scroll"><div class="tabs"><button class="active">思い出</button><button>写真</button><button>タイムライン</button><button>スポット</button></div>${items.map((m,i)=>`<div class="memory card"><div class="photo">${m.img?`<img src="${m.img}">`:(i==0?'🌅':i==1?'🍽️':'⛺')}</div><div><div class="heart">${fmt(m.d)}・${esc(m.p)} ♡ ${42-i*7}</div><h4>${esc(m.t)}</h4><p>${esc(m.c)}</p><button class="mini-btn" data-del-album="${m.id}">削除</button></div></div>`).join('')}</div><button class="float" data-modal="memory">+</button>${nav('album')}`}
function board(){const list=S.wishes.filter(w=>S.filter==='all'||w.s===S.filter),done=S.wishes.filter(w=>w.s==='done').length,rate=Math.round(done/Math.max(1,S.wishes.length)*100);return`${head('お願い掲示板','お願いごとややりたいことを共有しよう','board')}<div class="scroll"><div class="tabs">${[['all','すべて'],['pending','未対応'],['accepted','受付中'],['done','完了']].map(x=>`<button data-filter="${x[0]}" class="${S.filter===x[0]?'active':''}">${x[1]}</button>`).join('')}</div><div class="grid2"><div>${list.map(w=>`<div class="request card"><div class="request-top"><div><h4>${esc(w.t)}</h4><p>${esc(w.c)}</p></div><span class="tag ${w.s}">${status(w.s)}</span></div><div class="req-actions"><button data-status="${w.id}:pending">未対応</button><button data-status="${w.id}:accepted">受付中</button><button data-status="${w.id}:done">完了</button><button data-del-wish="${w.id}">削除</button></div></div>`).join('')}</div><div><div class="score card"><div class="label">今月のハート報酬</div><div class="big" style="font-size:30px">+${S.wishes.filter(w=>w.s==='done').reduce((a,b)=>a+b.pt,0)}</div></div><div class="score card" style="margin-top:10px"><div class="label">ふたりの協力度</div><div class="circle" style="--rate:${rate}">${rate}%</div><div class="mascot" style="width:58px;height:58px;font-size:32px;margin:auto">🐰</div></div></div></div></div><button class="float" data-modal="wish">+</button>${nav('board')}`}
function status(s){return s==='pending'?'未対応':s==='accepted'?'受付中':'完了'}
function calendar(){const sel=S.selected;return`${head('共有カレンダー','予定を共有して、もっとスムーズに','calendar')}<div class="scroll"><div class="month card">${month()}</div><div class="grid2 section"><div><div class="section-title"><h4>${fmt(sel)}の予定</h4><button class="mini-btn" data-modal="event">追加</button></div>${events(sel)}</div><div><div class="section-title"><h4>ToDoリスト</h4><button class="mini-btn" data-modal="todo">追加</button></div>${S.todos.map(t=>`<label class="todo ${t.done?'done':''}"><input type="checkbox" data-todo="${t.id}" ${t.done?'checked':''}><span>${esc(t.t)}｜${esc(t.who)}</span></label>`).join('')}</div></div></div><button class="float" data-modal="event">+</button>${nav('calendar')}`}
function month(){const sd=new Date(S.selected+'T00:00:00'),y=sd.getFullYear(),m=sd.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0),cells=[];for(let i=0;i<first.getDay();i++)cells.push(null);for(let d=1;d<=last.getDate();d++)cells.push(new Date(y,m,d));return`<div class="month-head"><button class="mini-btn" data-move="-1">‹</button><b>${y}年${m+1}月</b><button class="mini-btn" data-move="1">›</button></div><div class="month-grid">${['日','月','火','水','木','金','土'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells.map(d=>d?`<button class="day ${d.toISOString().slice(0,10)===today()?'today':''} ${d.toISOString().slice(0,10)===S.selected?'selected':''} ${S.events.some(e=>e.d===d.toISOString().slice(0,10))?'has':''}" data-date="${d.toISOString().slice(0,10)}">${d.getDate()}</button>`:'<div></div>').join('')}</div>`}
function events(d){const ev=S.events.filter(e=>e.d===d).sort((a,b)=>a.time.localeCompare(b.time));return ev.length?ev.map(e=>`<div class="event card"><time>${esc(e.time)}</time><div><h4>${esc(e.t)}</h4><p>${esc(e.memo)}｜${esc(e.type)}</p></div><button class="mini-btn" data-del-event="${e.id}">削除</button></div>`).join(''):'<div class="card" style="padding:14px;color:#8d7b85;font-weight:800">予定はありません</div>'}
function privacy(){const p=S.privacy;return`${head('プライバシーセンター','安心・安全に使うための設定を大切に','privacy')}<div class="scroll"><div class="hero card"><div style="width:100%"><div class="screen-head" style="padding:0"><div><h3>位置情報の共有</h3><small>お互いの同意のもとで、安心をサポートします</small></div><button class="switch ${p.on?'on':''}" data-loc></button></div><div class="map section"><div class="pin">💞</div></div></div></div><div class="section">${[['always','📍','常に共有','常に共有します'],['timed','⏱️','時間限定共有',p.hours+'時間だけ共有'],['emergency','🆘','緊急時のみ','緊急時だけ共有']].map(x=>`<button class="privacy-option ${p.mode===x[0]?'active':''}" data-priv="${x[0]}"><span>${x[1]}</span><div><strong>${x[2]}</strong><small>${x[3]}</small></div><span>${p.mode===x[0]?'✓':''}</span></button>`).join('')}</div><div class="section card" style="padding:12px"><label class="todo"><input type="checkbox" data-cons="a" ${p.a?'checked':''}><span>${esc(S.a)}が同意</span></label><label class="todo"><input type="checkbox" data-cons="b" ${p.b?'checked':''}><span>${esc(S.b)}が同意</span></label></div><div class="grid2 section"><button class="btn" data-invite>招待リンク</button><button class="btn" data-export>データ書き出し</button><button class="btn danger" data-unlink>連携解除</button><button class="btn danger" data-wipe>全データ削除</button></div><div class="section"><div class="section-title"><h4>共有履歴</h4><small>${p.logs.length}件</small></div>${p.logs.slice().reverse().map(l=>`<div class="event card"><time>🛡️</time><div><h4>${esc(l.m)}</h4><p>${esc(l.at)}</p></div></div>`).join('')}</div></div>${nav('privacy')}`}
function onboard(){return`<main class="app"><div style="max-width:760px;margin:7vh auto" class="card"><form id="start" style="padding:24px"><div class="brand"><div class="logo">∞</div><div><h1>Couplee</h1><p>名前と記念日を入力すると、画像通りの6画面アプリに反映されます。</p></div></div><div class="form-grid section"><div class="field"><label>あなたの名前</label><input name="a" value="${esc(S.a)}"></div><div class="field"><label>パートナーの名前</label><input name="b" value="${esc(S.b)}"></div></div><div class="form-grid"><div class="field"><label>あなたのアイコン</label><input name="aa" value="${esc(S.aa)}"></div><div class="field"><label>相手のアイコン</label><input name="bb" value="${esc(S.bb)}"></div></div><div class="field"><label>交際開始日 / 大切な日</label><input type="date" name="start" value="${esc(S.start)}"></div><div class="field"><label>記念日名</label><input name="anniv" value="${esc(S.anniv)}"></div><div class="field"><label>関係フェーズ</label><select name="phase">${['交際初期','遠距離','同棲','新婚','改善したい'].map(x=>`<option ${S.phase===x?'selected':''}>${x}</option>`).join('')}</select></div><button class="btn primary full">アプリを開始する</button></form></div></main>`}
function modal(type){return`<div class="modal-back"><div class="modal"><div class="modal-head"><h3>${{profile:'名前・記念日編集',memory:'思い出追加',wish:'お願い追加',event:'予定追加',todo:'ToDo追加',milestone:'軌跡追加'}[type]}</h3><button class="x" data-close>×</button></div>${modalBody(type)}</div></div>`}
function modalBody(type){if(type==='profile')return`<form data-form="profile"><div class="form-grid"><div class="field"><label>あなたの名前</label><input name="a" value="${esc(S.a)}"></div><div class="field"><label>パートナー名</label><input name="b" value="${esc(S.b)}"></div></div><div class="form-grid"><div class="field"><label>あなたのアイコン</label><input name="aa" value="${esc(S.aa)}"></div><div class="field"><label>相手のアイコン</label><input name="bb" value="${esc(S.bb)}"></div></div><div class="field"><label>交際開始日</label><input type="date" name="start" value="${S.start}"></div><div class="field"><label>記念日名</label><input name="anniv" value="${esc(S.anniv)}"></div><button class="btn primary full">保存</button></form>`;if(type==='memory')return`<form data-form="memory"><div class="field"><label>タイトル</label><input name="t"></div><div class="form-grid"><div class="field"><label>日付</label><input type="date" name="d" value="${today()}"></div><div class="field"><label>場所</label><input name="p"></div></div><div class="field"><label>写真</label><input type="file" name="img" accept="image/*"></div><div class="field"><label>キャプション</label><textarea name="c"></textarea></div><button class="btn primary full">追加</button></form>`;if(type==='wish')return`<form data-form="wish"><div class="field"><label>お願いタイトル</label><input name="t"></div><div class="field"><label>内容</label><textarea name="c"></textarea></div><div class="field"><label>報酬pt</label><input type="number" name="pt" value="30"></div><button class="btn primary full">追加</button></form>`;if(type==='event')return`<form data-form="event"><div class="field"><label>予定名</label><input name="t"></div><div class="form-grid"><div class="field"><label>日付</label><input type="date" name="d" value="${S.selected}"></div><div class="field"><label>時間</label><input type="time" name="time" value="19:00"></div></div><div class="field"><label>メモ</label><input name="memo"></div><button class="btn primary full">追加</button></form>`;if(type==='todo')return`<form data-form="todo"><div class="field"><label>ToDo</label><input name="t"></div><div class="field"><label>担当</label><select name="who"><option>ふたり</option><option>${esc(S.a)}</option><option>${esc(S.b)}</option></select></div><button class="btn primary full">追加</button></form>`;return`<form data-form="milestone"><div class="field"><label>タイトル</label><input name="t"></div><div class="field"><label>日付</label><input type="date" name="d" value="${today()}"></div><button class="btn primary full">追加</button></form>`}
function bind(){document.querySelectorAll('[data-modal]').forEach(b=>b.onclick=()=>{S.modal=b.dataset.modal;render()});document.querySelectorAll('[data-close],.modal-back').forEach(e=>e.onclick=x=>{if(x.target===e||e.dataset.close!==undefined){S.modal=null;render()}});$('#start')&&($('#start').onsubmit=e=>{e.preventDefault();Object.assign(S,Object.fromEntries(new FormData(e.target)));S.ready=true;save();render();toast('専用アプリを作成しました')});document.querySelectorAll('[data-ans]').forEach(t=>t.oninput=()=>{S[t.dataset.ans]=t.value;save()});document.querySelectorAll('[data-reveal]').forEach(b=>b.onclick=()=>{S.revealed=true;S.points+=40;save();render();toast('回答を開きました')});document.querySelectorAll('[data-nextq]').forEach(b=>b.onclick=()=>{const qs=['今週一緒にしたいことは？','相手に感謝したいことは？','次のデートで食べたいものは？','最近うれしかったことは？'];S.q=qs[Math.floor(Math.random()*qs.length)];S.ansA=S.ansB='';S.revealed=false;save();render()});document.querySelectorAll('[data-mood]').forEach(b=>b.onclick=()=>{const[k,v]=b.dataset.mood.split(':');S[k]=v;S.points+=5;save();render();toast('気分を共有しました')});document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{S.filter=b.dataset.filter;render()});document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{const[i,st]=b.dataset.status.split(':');let w=S.wishes.find(x=>x.id===i);if(w){if(w.s!=='done'&&st==='done')S.points+=w.pt;w.s=st;save();render();toast('ステータス更新') }});document.querySelectorAll('[data-date]').forEach(b=>b.onclick=()=>{S.selected=b.dataset.date;render()});document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>{let d=new Date(S.selected+'T00:00:00');d.setMonth(d.getMonth()+Number(b.dataset.move));S.selected=d.toISOString().slice(0,10);render()});document.querySelectorAll('[data-todo]').forEach(c=>c.onchange=()=>{let t=S.todos.find(x=>x.id===c.dataset.todo);if(t){t.done=c.checked;save();render()}});document.querySelectorAll('[data-loc]').forEach(b=>b.onclick=()=>{S.privacy.on=!S.privacy.on;S.privacy.logs.push({at:new Date().toLocaleString('ja-JP'),m:'位置情報共有を'+(S.privacy.on?'ON':'OFF')});save();render()});document.querySelectorAll('[data-priv]').forEach(b=>b.onclick=()=>{S.privacy.mode=b.dataset.priv;S.privacy.logs.push({at:new Date().toLocaleString('ja-JP'),m:'共有モードを変更'});save();render()});document.querySelectorAll('[data-cons]').forEach(c=>c.onchange=()=>{S.privacy[c.dataset.cons]=c.checked;save();render()});document.querySelectorAll('[data-export]').forEach(b=>b.onclick=()=>{const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='couplee-data.json';a.click();URL.revokeObjectURL(u)});document.querySelectorAll('[data-invite]').forEach(b=>b.onclick=async()=>{let u=location.origin+'?invite=couplee';try{await navigator.clipboard.writeText(u);toast('招待リンクをコピーしました')}catch{prompt('招待リンク',u)}});document.querySelectorAll('[data-unlink]').forEach(b=>b.onclick=()=>{if(confirm('連携解除しますか？')){S.b='未連携';S.privacy.on=false;save();render()}});document.querySelectorAll('[data-wipe],[data-reset]').forEach(b=>b.onclick=()=>{if(confirm('初期化しますか？')){localStorage.removeItem(KEY);S=initial();render()}});document.querySelectorAll('[data-notify]').forEach(b=>b.onclick=async()=>{if('Notification'in window){let p=Notification.permission==='default'?await Notification.requestPermission():Notification.permission;if(p==='granted')new Notification('Couplee 記念日リマインダー',{body:`${S.anniv}まであと${days(today(),nextAnniv(S.start))}日です`});else toast('通知が許可されていません')}else toast('通知非対応です')});document.querySelectorAll('[data-del-album]').forEach(b=>b.onclick=()=>{S.album=S.album.filter(x=>x.id!==b.dataset.delAlbum);save();render()});document.querySelectorAll('[data-del-wish]').forEach(b=>b.onclick=()=>{S.wishes=S.wishes.filter(x=>x.id!==b.dataset.delWish);save();render()});document.querySelectorAll('[data-del-event]').forEach(b=>b.onclick=()=>{S.events=S.events.filter(x=>x.id!==b.dataset.delEvent);save();render()});document.querySelectorAll('[data-form]').forEach(f=>f.onsubmit=async e=>{e.preventDefault();let fd=new FormData(f),o=Object.fromEntries(fd.entries());if(f.dataset.form==='profile'){Object.assign(S,o)}if(f.dataset.form==='memory'){let img='',file=fd.get('img');if(file&&file.size)img=await new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file)});S.album.unshift({id:id(),t:o.t||'新しい思い出',d:o.d||today(),p:o.p||'',c:o.c||'',img})}if(f.dataset.form==='wish')S.wishes.unshift({id:id(),t:o.t||'お願い',c:o.c||'',s:'pending',from:'a',pt:Number(o.pt||30)});if(f.dataset.form==='event'){S.events.push({id:id(),t:o.t||'予定',d:o.d||today(),time:o.time||'',memo:o.memo||'',type:'予定'});S.selected=o.d||today()}if(f.dataset.form==='todo')S.todos.push({id:id(),t:o.t||'ToDo',who:o.who||'ふたり',done:false});if(f.dataset.form==='milestone')toast('軌跡を追加しました');S.modal=null;save();render();toast('保存しました')})}
render();
</script>
</body>
</html>
